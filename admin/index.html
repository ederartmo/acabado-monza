<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Administrar Acabados Monza</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100svh; display: grid; place-items: center; padding: 1.5rem; font-family: system-ui, sans-serif; color: #10213d; background: linear-gradient(135deg, #eef5ff, #f8fbff); }
      main { width: min(100%, 520px); padding: 2rem; border: 1px solid #dce7f5; border-radius: 22px; background: #fff; box-shadow: 0 24px 60px rgba(17, 40, 92, .12); text-align: center; }
      img { width: min(230px, 70%); margin: 0 auto 1.4rem; }
      h1 { margin: 0 0 .7rem; font-size: clamp(1.65rem, 5vw, 2.25rem); }
      p { margin: 0 auto 1.4rem; color: #52627a; line-height: 1.55; }
      a { display: inline-flex; min-height: 48px; align-items: center; justify-content: center; padding: .8rem 1.2rem; border-radius: 12px; background: #1557d6; color: #fff; font-weight: 750; text-decoration: none; }
      small { display: block; margin-top: 1rem; color: #718198; }
    </style>
  </head>
  <body>
    <main>
      <img src="../assets/brand/logo_negro.webp" alt="Acabados Monza" />
      <h1>Administrar sitio</h1>
      <p>Actualiza textos, fotografías y productos desde el panel seguro de contenido.</p>
      <a href="https://app.pagescms.org/" rel="noreferrer">Entrar al panel</a>
      <small>El acceso requiere una cuenta autorizada.</small>
    </main>
  </body>
</html>
